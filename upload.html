<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>העלת פוסטים ״בסייעתא דשמיא״</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;
background:#f2f4f5;
padding:20px;

}


h2{

margin-bottom:20px;
font-size:28px;
display: flex;
justify-content: center;
}

form{

display:flex;
flex-direction:column;
gap:16px;

}

input,
textarea{

width:100%;

padding:15px;

border-radius:14px;

border:1px solid #d1d5db;

font-size:16px;

background:white;

}

textarea{

min-height:160px;
resize:none;

}

.upload-box{

width:100%;

min-height:180px;

border:2px dashed #cbd5e1;

border-radius:20px;

background:white;

display:flex;

align-items:center;
justify-content:center;

position:relative;

overflow:hidden;

cursor:pointer;

transition:.2s;

}

.upload-box:hover{

border-color:#111827;

}

.upload-box input{

position:absolute;
inset:0;

opacity:0;

cursor:pointer;

}

.upload-content{

text-align:center;

pointer-events:none;

}

.upload-icon{

width:70px;
height:70px;

border-radius:50%;

background:#111827;

color:white;

display:flex;

align-items:center;
justify-content:center;

font-size:30px;

margin:auto;
margin-bottom:14px;

}

.upload-title{

font-size:18px;
font-weight:bold;

margin-bottom:6px;

}

.upload-subtitle{

color:#64748b;
font-size:14px;

}

.preview-container{

display:flex;
flex-wrap:wrap;
gap:12px;

}

.preview-item{

position:relative;

width:120px;
height:120px;

border-radius:18px;

overflow:hidden;

background:#000;

}

.preview-item img,
.preview-item video{

width:100%;
height:100%;

object-fit:cover;

}

.remove-btn{

position:absolute;

top:8px;
left:8px;

width:34px;
height:34px;

border:none;

border-radius:50%;

background:rgba(0,0,0,.8);

color:white;

font-size:18px;

cursor:pointer;

z-index:10;

}

button.submit-btn{

height:54px;

border:none;

background:#111827;

color:white;

border-radius:14px;

font-size:17px;

cursor:pointer;

}

button.submit-btn:disabled{

opacity:.6;

}

.status{

animation:showStatus .25s ease;

display:none;

position:fixed ;

top:20px;

left:50%;

transform:translateX(-50%);

z-index:2147483647;

padding:14px 20px;

border-radius:14px;

font-size:15px;

font-weight:bold;

min-width:220px;

max-width:90%;

text-align:center;

box-shadow:0 10px 25px rgba(0,0,0,.15);

backdrop-filter:blur(10px);

}



@keyframes showStatus{

from{

opacity:0;
transform:translate(-50%,-15px);

}

to{

opacity:1;
transform:translate(-50%,0);

}

}

.loading{

background:#dbeafe;
color:#1e40af;

}

.success{

background:#dcfce7;
color:#166534;

}

.error{

background:#fee2e2;
color:#991b1b;

}

#titleCounter{
margin-top:6px;
font-size:13px;
color:#64748b;
text-align:left;
}




.loader{

width:18px;
height:18px;

border:3px solid rgba(255,255,255,.35);

border-top-color:currentColor;

border-radius:50%;

animation:spin .8s linear infinite;

}

@keyframes spin{

to{
transform:rotate(360deg);
}

}

.links-box{
background:white;
padding:16px;
border-radius:18px;
border:1px solid #e5e7eb;
}

.links-title{
font-size:18px;
font-weight:bold;
margin-bottom:14px;
text-align: center;
}

.link-item{
display:flex;
flex-direction:column;
gap:10px;
padding:12px;
background:#f8fafc;
border-radius:14px;
margin-bottom:12px;
border:1px solid #e2e8f0;
}
.external-line1{
  flex:0 0 auto;
}
.add-link-btn{
  display: block;
height:46px;
border:none;
background:#111827;
color:white;
padding:0 18px;
border-radius:12px;
cursor:pointer;
font-size:15px;
margin: 0 auto;
}

.remove-link{
height:42px;
border:none;
background:#ef4444;
color:white;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

.upload-warning{

display:none;

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

z-index:999999;

width:90%;
max-width:420px;

background:white;

border:1px solid #fdba74;

color:#9a3412;

padding:24px;

border-radius:24px;

text-align:center;

font-size:16px;

line-height:2;

box-shadow:0 20px 60px rgba(0,0,0,.25);
animation:popup .25s ease;
}

.warning-overlay{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.45);

backdrop-filter:blur(4px);

z-index:999998;

}
.back-btn{

display:flex;

justify-content: right;
margin-bottom:2px;
margin-top: 10px;

}

@keyframes popup{

from{

opacity:0;

transform:
translate(-50%,-50%)
scale(.9);

}

to{

opacity:1;

transform:
translate(-50%,-50%)
scale(1);

}

}

/* ---------- PAGE TRANSITION ---------- */

html,
body{

overflow-x:hidden;

}

/* כניסה */

.page-wrap{

opacity:0;

transform:
translateX(220px)
scale(.98);

filter:blur(8px);

animation:
pageEnter 1.1s cubic-bezier(.22,1,.36,1)
forwards;

}


/* יציאה */

.page-wrap.page-exit{

opacity:0;

transform:
translateX(-220px)
scale(.98);

filter:blur(8px);

transition:
transform .9s cubic-bezier(.22,1,.36,1),
opacity .9s ease,
filter .9s ease;

}

/* אנימציית כניסה */

@keyframes pageEnter{

from{

opacity:0;

transform:
translateX(220px)
scale(.98);

filter:blur(8px);

}

to{

opacity:1;

transform:
translateX(0)
scale(1);

filter:blur(0);

}

}

.back-link{

height:40px;

padding:0 14px;

border:none;

background:none;

color:rgb(50,75,186);

cursor:pointer;

font-size:14px;

position:relative;

}

/* הקו */

.back-link::after{

content:"";

position:absolute;

right:14px;

bottom:4px;

width:0;


background:currentColor;

transition:width .35s ease;

}

/* hover */

.back-link:hover::after{

width:calc(100% - 28px);

}
</style>

</head>

<body>
  <div class="page-wrap">

<div class="back-btn">

<button
onclick="goHome()"
class="back-link"
>
❮ חזרה
</button>
</div>

  <h2>
העלאת פוסט
</h2>

  <div
class="warning-overlay"
id="warningOverlay"
></div>

<div
class="upload-warning"
id="uploadWarning"
style="display:none"
>

העלאת מספר סרטונים כבדה ויכולה לקחת
מספר שניות / דקות.
<br><br>

נא להתאזר בסבלנות 🙏
<br>

אנחנו מודים לכם מאוד.

</div>
<form id="postForm">

<div>

<input
type="text"
id="title"
placeholder="שם משתמש"
maxlength="15"
required
>

<div id="titleCounter">
0 / 15
</div>

</div>

<textarea
id="content"
placeholder="תוכן"
required
></textarea>

<div class="links-box">

<div class="links-title">
לינקים לפוסט <br>(אופציונאלי וכן אפשרי בתוכן עצמו)
</div>

<div id="linksContainer"></div>

<button
type="button"
class="add-link-btn"
onclick="addLinkField()"
>
+ הוסף לינק
</button>

</div>


<label class="upload-box">

<input
type="file"
id="media"
accept="image/*,video/*"
multiple
>

<div class="upload-content">

<div class="upload-icon">
⬆
</div>

<div class="upload-title">
העלאת תמונות וסרטונים (אופציונאלי)
</div>

<div class="upload-subtitle">
אפשר לבחור כמה קבצים
<br>
עד 4 סרטונים
</div>

</div>

</label>

<div
class="preview-container"
id="previewContainer"
></div>

<button
class="submit-btn"
id="submitBtn"
>
פרסם פוסט
</button>


</form>
</div>
<div
class="status"
id="statusBox"
></div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js'

const supabaseUrl =
'https://pnnfstfabmhjzohkypak.supabase.co'

const supabaseKey =
'sb_publishable_35mU1ZemsGDIzZUJ-bWXuw_bLvT2VRo'

const supabase =
createClient(
supabaseUrl,
supabaseKey
)

const form =
document.getElementById("postForm")

const mediaInput =
document.getElementById("media")

const previewContainer =
document.getElementById("previewContainer")

const statusBox =
document.getElementById("statusBox")

const submitBtn =
document.getElementById("submitBtn")

const titleInput =
document.getElementById("title")

const titleCounter =
document.getElementById("titleCounter")

titleInput.addEventListener(
"input",
()=>{

const max = 15

const current =
titleInput.value.length

const left =
max - current

titleCounter.innerText =
`${current} / ${max}`

})

function goHome(){

document
.querySelector(".page-wrap")
.classList.add("page-exit")

setTimeout(()=>{

window.location.href =
"index.html"

},900)

}

let selectedFiles = []

function showStatus(text,type){

statusBox.style.position = "fixed"

statusBox.style.top = "20px"

statusBox.style.left = "50%"

statusBox.style.transform = "translateX(-50%)"

statusBox.style.zIndex = "999999999"

statusBox.style.display = "flex"

statusBox.style.alignItems = "center"

statusBox.style.justifyContent = "center"

statusBox.style.gap = "10px"

statusBox.style.padding = "14px 20px"

statusBox.style.borderRadius = "18px"

statusBox.style.maxWidth = "90%"

statusBox.style.boxShadow =
"0 10px 30px rgba(0,0,0,.18)"

statusBox.className =
`status ${type}`

if(type === "loading"){

statusBox.innerHTML = `

<div class="loader"></div>

<span>${text}</span>

`

}else{

statusBox.innerHTML = `

<span>${text}</span>

`

}

}

/* ---------- תצוגה מקדימה ---------- */

mediaInput.addEventListener(
"change",
()=>{

const files =
Array.from(mediaInput.files)

const currentVideos =
selectedFiles.filter(
f => f.type.startsWith("video")
).length

const newVideos =
files.filter(
f => f.type.startsWith("video")
).length

if(currentVideos + newVideos > 4){

showStatus(
"אפשר להעלות עד 4 סרטונים בלבד",
"error"
)

mediaInput.value = ""

return

}

files.forEach(file=>{

    const alreadyExists =
selectedFiles.some(
f =>
f.name === file.name &&
f.size === file.size
)

if(alreadyExists){

  return

}

const maxSize =
50 * 1024 * 1024

if(file.size > maxSize){

showStatus(
`הקובץ ${file.name} גדול מ־50MB`,
"error"
)

return

}

selectedFiles.push(file)

const fileUrl =
URL.createObjectURL(file)

const div =
document.createElement("div")

div.className =
"preview-item"

if(
file.type.startsWith("video")
){

div.innerHTML = `

<button
type="button"
class="remove-btn"
>
✕
</button>

<video
src="${fileUrl}"
controls
autoplay
muted
loop
playsinline
webkit-playsinline
preload="auto"
></video>
`

}else{

div.innerHTML = `

<button
type="button"
class="remove-btn"
>
✕
</button>

<img loading="lazy" decoding="async"
src="${fileUrl}"
>

`

}

div
.querySelector(".remove-btn")

.addEventListener(
"click",
()=>{

URL.revokeObjectURL(fileUrl)

selectedFiles =
selectedFiles.filter(
f => f !== file
)

div.remove()

})

previewContainer.appendChild(div)

setTimeout(()=>{

div.scrollIntoView({
behavior:"smooth",
block:"end"
})

},100)
})

mediaInput.value = ""

})


let links = []

function addLinkField(){

const id = Date.now()

links.push({
id,
title:"",
url:""
})

renderLinks()

}

function renderLinks(){

const container =
document.getElementById("linksContainer")

let html = ""

links.forEach(link=>{

html += `

<div class="link-item">

<input
placeholder="שם הלינק"
value="${link.title}"
oninput="updateLinkTitle(${link.id},this.value)"
>

<input
placeholder="https://example.com"
value="${link.url}"
oninput="updateLinkUrl(${link.id},this.value)"
>

<button
type="button"
class="remove-link"
onclick="removeLink(${link.id})"
>
מחק לינק
</button>

</div>

`

})

container.innerHTML = html

}

window.updateLinkTitle =
(id,value)=>{

links = links.map(link=>

link.id === id

? {...link,title:value}

: link

)

}

window.updateLinkUrl =
(id,value)=>{

links = links.map(link=>

link.id === id

? {...link,url:value}

: link

)

}

window.removeLink =
(id)=>{

links =
links.filter(link=>link.id !== id)

renderLinks()

}

window.addLinkField =
addLinkField



window.goHome = goHome


async function compressImage(file){

return new Promise((resolve,reject)=>{

const img = new Image()

const reader = new FileReader()

reader.onload = e => {

img.src = e.target.result

}

img.onload = ()=>{

const canvas =
document.createElement("canvas")

const ctx =
canvas.getContext("2d")

/* גודל מקסימלי */

const MAX_WIDTH = 1200
const MAX_HEIGHT = 1200

let width = img.width
let height = img.height

/* הגנה מתמונות ענק */

if(
width > 4000 ||
height > 4000
){

const ratio =
Math.min(
4000 / width,
4000 / height
)

width *= ratio
height *= ratio

}
/* הקטנה פרופורציונלית */

if(width > height){

if(width > MAX_WIDTH){

height *= MAX_WIDTH / width
width = MAX_WIDTH

}

}else{

if(height > MAX_HEIGHT){

width *= MAX_HEIGHT / height
height = MAX_HEIGHT

}

}

canvas.width = width
canvas.height = height

ctx.drawImage(
img,
0,
0,
width,
height
)

/* איכות JPG */

canvas.toBlob(

(blob)=>{

if(!blob){

reject(
new Error("Compression failed")
)

return

}

const compressedFile =
new File(

[blob],

file.name.replace(
/\.\w+$/,
".jpg"
),

{
type:"image/jpeg"
}

)

resolve(compressedFile)

},

"image/jpeg",

0.7 /* איכות */

)

}

reader.onerror = reject

reader.readAsDataURL(file)

})

}

/* ---------- שליחה ---------- */

form.addEventListener(
"submit",

async(e)=>{

e.preventDefault()

submitBtn.disabled = true

showStatus(
"מעלה פוסט...",
"loading"
)

const uploadWarningTimeout =
setTimeout(()=>{

document
.getElementById("uploadWarning")
.style.display = "block"

document
.getElementById("warningOverlay")
.style.display = "block"

},10000)
const title =
document.getElementById("title").value

const content =
document.getElementById("content").value


let mediaUrls = []


/* ---------- העלאת קבצים ---------- */

try{

const uploadPromises =
selectedFiles.map(async(file)=>{

let uploadFile = file

/* רק לתמונות */

if(file.type.startsWith("image")){

uploadFile =
await compressImage(file)

}

const fileName =

Date.now() +
"-" +
Math.random()
.toString(36)
.slice(2)
+
"-" +
uploadFile.name

const { error:uploadError } =

await supabase.storage

.from("posts")

.upload(
fileName,
uploadFile
)

if(uploadError){

throw uploadError

}

const { data:urlData } =

supabase.storage

.from("posts")

.getPublicUrl(fileName)

return urlData.publicUrl

})

mediaUrls =
await Promise.race([

Promise.all(uploadPromises),

new Promise((_, reject)=>

setTimeout(
()=>reject(new Error("timeout")),
30000
)

)

])

}catch(err){

console.log(err)

showStatus(
"שגיאה בהעלאת קבצים",
"error"
)

clearTimeout(uploadWarningTimeout)

document
.getElementById("uploadWarning")
.style.display = "none"

document
.getElementById("warningOverlay")
.style.display = "none"

submitBtn.disabled = false

return

}

/* ---------- שמירת פוסט ---------- */

const { error } =

await supabase

.from("posts")

.insert([{

title,

content,

links,

media_urls:mediaUrls,

type:"post"

}])

if(error){

console.log(error)

showStatus(
"שגיאה בשמירת הפוסט",
"error"
)

clearTimeout(uploadWarningTimeout)

document
.getElementById("uploadWarning")
.style.display = "none"

document
.getElementById("warningOverlay")
.style.display = "none"

submitBtn.disabled = false

return

}

showStatus(
"הפוסט פורסם בהצלחה, מעביר לדף הראשי",
"success"
)

selectedFiles = []
links = []
form.reset()
previewContainer.innerHTML = ""

renderLinks()

clearTimeout(uploadWarningTimeout)

document
.getElementById("uploadWarning")
.style.display = "none"

document
.getElementById("warningOverlay")
.style.display = "none"

setTimeout(()=>{

window.location.href =
"index.html"

},1500)

})

</script>

</body>
</html>
