<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Panel</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

.post{
border:1px solid #444;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 20px;
cursor:pointer;
border:none;
border-radius:8px;
margin-top:10px;
}

.approve{
background:#16a34a;
color:white;
}

.login{
background:#2563eb;
color:white;
font-size:18px;
}
</style>
</head>
<body>

<h1>ניהול פוסטים</h1>

<button class="login" id="loginBtn">
התחבר עם Google
</button>

<button id="logoutBtn">
Logout
</button>

<div id="posts"></div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseUrl = 'https://pnnfstfabmhjzohkypak.supabase.co'
const supabaseKey = 'sb_publishable_35mU1ZemsGDIzZUJ-bWXuw_bLvT2VRo'

const supabase = createClient(
  supabaseUrl,
  supabaseKey,
  {
    auth:{
      persistSession:false
    }
  }
)

const postsDiv = document.getElementById('posts')
const loginBtn = document.getElementById('loginBtn')




loginBtn.onclick = async () => {

await supabase.auth.signInWithOAuth({

provider:'google',

options:{
redirectTo:
window.location.origin + '/admin.html'
}

})

}


async function checkUser(){

const {
data:{user}
} = await supabase.auth.getUser()

if(!user){
return
}

loadPosts()

}

async function loadPosts(){

const { data, error } = await supabase
.from('posts')
.select('*')
.eq('reviewed', false)
.order('created_at',{ascending:false})

if(error){
console.log(error)
return
}



postsDiv.innerHTML = ''



data.forEach(post => {

const div = document.createElement('div')

div.className = 'post'


div.innerHTML = `

<h2>${post.title || ''}</h2>

<p>${post.content || ''}</p>

<button class="approve">
אשר פוסט
</button>

`



const btn = div.querySelector('button')

btn.onclick = async () => {

const { data, error } = await supabase
.from('posts')
.update({
approved:true,
reviewed:true
})
.eq('id', post.id)
.select()

console.log(post.id)
console.log(data)
console.log(error)

if(error){

console.log(error)

alert(error.message)

return

}


div.remove()

}



postsDiv.appendChild(div)

})

}

const logoutBtn =
document.getElementById('logoutBtn')

logoutBtn.onclick = async () => {

await supabase.auth.signOut()

location.reload()

}

checkUser()

supabase.auth.onAuthStateChange(() => {

checkUser()

})

</script>

</body>
</html>
