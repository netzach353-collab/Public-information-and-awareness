if(error){

}

window.postsData = data || []

renderPosts(window.postsData)

}

const params =
new URLSearchParams(window.location.search)

params.get("id")

function renderPosts(posts){

postsGrid.innerHTML = ""

window.postsData = posts

let html = ""

posts.forEach(post=>{

html += `

<div class="card"
onclick="openPostById('${post.id}')">

${

post.media_urls?.[0]
?.toLowerCase()
.includes(".mp4")

? `

<video
muted
playsinline
webkit-playsinline
preload="metadata"

onloadedmetadata="

"

style="

"

</video>

`

: post.media_urls?.[0]

? `

style="

<div class="card-body">

${makeLinksClickable(

)}

`

})

function openPost(post){

const mediaContainer =
document.getElementById("mediaContainer")

const mediaUrl =
post.media_urls?.[0] || ""

if(mediaUrl.toLowerCase().includes(".mp4")){

mediaContainer.innerHTML = `
<video
id="activeVideo"
class="modal-image"
src="${mediaUrl}"
controls
playsinline
webkit-playsinline
preload="auto"

style="
width:100%;
height:280px;
object-fit:contain;
background:black;
">
</video>
`

}else{

mediaContainer.innerHTML = `
<img
loading="lazy"
decoding="async"
class="modal-image"
src="${mediaUrl}">
`

}

const imageBar =
document.getElementById("imageBar")

document.getElementById("modalTitle")
.innerText = post.title || ''

document.getElementById("modalTopTitle")
.innerText = post.title || ''
document.getElementById("modalContent")
.innerHTML =
makeLinksClickable(
escapeHtml(post.content || '')
)

if(post.links?.length){

document.getElementById("modalContent")
.innerHTML += `

<div class="post-links">

${post.links.map(link=>`

<a
href="${safeUrl(link.url)}"
target="_blank"
rel="noopener noreferrer"
class="post-link-card"
>

<div class="post-link-icon">
🔗
</div>

<div>

<div class="post-link-title">
${escapeHtml(link.title || '')}
</div>

<div class="post-link-url">
${escapeHtml(link.url || '')}
</div>

</div>

</a>

`).join("")}

</div>

`

}

imageBar.innerHTML = ""

post.media_urls?.forEach((url,index)=>{

let mediaThumb

/* VIDEO */

if(url.toLowerCase().includes(".mp4")){

mediaThumb =
document.createElement("video")

mediaThumb.src = url

mediaThumb.muted = true

mediaThumb.playsInline = true

mediaThumb.preload = "metadata"

mediaThumb.currentTime = 0.1

mediaThumb.onloadedmetadata = ()=>{

mediaThumb.currentTime = 0.1

}
mediaThumb.style.objectFit = "cover"

mediaThumb.style.background = "black"

}else{

mediaThumb =
document.createElement("img")

mediaThumb.src = url

}

/* CLASS */

mediaThumb.className = "image-thumb"

if(index === 0){

mediaThumb.classList.add("active")

}

mediaThumb.onclick = ()=>{

/* VIDEO */

if(url.toLowerCase().includes(".mp4")){

mediaContainer.innerHTML = `

<video
id="activeVideo"
class="modal-image"
src="${url}"
controls
playsinline
webkit-playsinline
preload="auto"

style="
width:100%;
height:280px;
object-fit:contain;
background:black;
">

</video>

`

}else{

mediaContainer.innerHTML = `

<img
class="modal-image"
src="${url}">

`

}

/* ACTIVE */

document
.querySelectorAll(".image-thumb")
.forEach(el=>{

el.classList.remove("active")

})

mediaThumb.classList.add("active")

}

imageBar.appendChild(mediaThumb)

})

postModal.classList.add("show")

document.body.style.overflow = "hidden"

window.scrollTo(0,0)

}

function closePost(){

const videos =
document.querySelectorAll("#mediaContainer video")

videos.forEach(video => {

video.pause()

video.currentTime = 0

video.removeAttribute("src")

video.load()

})

postModal.classList.remove("show")

document.body.style.overflow = ""

}

function escapeHtml(text){

return text
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#039;")

}

function safeUrl(url){

if(!url) return "#"

try{

const parsed =
new URL(url)

if(
parsed.protocol === "http:" ||
parsed.protocol === "https:"
){

return parsed.href

}

}catch(e){}

return "#"

}
